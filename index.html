<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리집 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --cream:#FAF5EC;
    --paper:#FFFDF8;
    --ink:#3A2E27;
    --ink-soft:#7C6F63;
    --rust:#B5562A;
    --rust-dark:#8A3F1C;
    --rust-tint:#F3E1D5;
    --sage:#7C8B6F;
    --sage-dark:#5C6B50;
    --sage-tint:#E7EBE1;
    --line:#E7DDCE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Work Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto;padding:0 0 80px;}
  header{padding:28px 20px 14px;text-align:center;}
  header h1{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:0 0 4px;letter-spacing:-0.01em;}
  header p{margin:0;font-size:13px;color:var(--ink-soft);}

  .view-toggle{display:flex;gap:8px;margin:6px 20px 0;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:4px;}
  .view-toggle button{flex:1;padding:9px 0;border:none;border-radius:9px;background:transparent;color:var(--ink-soft);font-size:13.5px;font-weight:500;font-family:'Work Sans',sans-serif;cursor:pointer;}
  .view-toggle button.active{background:var(--ink);color:#fff;}

  .month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:16px 20px 0;}
  .month-nav button{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--paper);color:var(--ink);font-size:15px;cursor:pointer;}
  .month-nav button:active{transform:scale(0.94);}
  .month-nav .label{font-family:'Work Sans',sans-serif;font-size:17px;font-weight:600;min-width:110px;text-align:center;}

  .receipt{margin:18px 20px 0;background:var(--paper);border:1px solid var(--line);border-radius:2px;padding:20px 22px 16px;position:relative;box-shadow:0 1px 0 var(--line);}
  .receipt::after{content:"";position:absolute;left:0;right:0;bottom:-7px;height:14px;
    background:linear-gradient(135deg, transparent 50%, var(--cream) 50%) 0 0/14px 14px repeat-x,
      linear-gradient(-135deg, transparent 50%, var(--cream) 50%) 0 0/14px 14px repeat-x;
    background-position: 0 0, 7px 0;}
  .receipt-total-label{font-size:11px;letter-spacing:.08em;color:var(--ink-soft);text-transform:uppercase;}
  .receipt-total{font-family:'Work Sans',sans-serif;font-size:32px;font-weight:700;margin:2px 0 12px;}
  .receipt-total.positive{color:var(--sage-dark);}
  .receipt-total.negative{color:var(--rust-dark);}
  .receipt-io{display:flex;gap:10px;border-top:1px dashed var(--line);padding-top:12px;margin-bottom:12px;}
  .receipt-io .box{flex:1;font-size:12.5px;}
  .receipt-io .box .lbl{color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .receipt-io .box .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .receipt-io .box.exp .dot{background:var(--rust);}
  .receipt-io .box.inc .dot{background:var(--sage);}
  .receipt-io .box .val{font-weight:600;font-size:16px;display:block;margin-top:3px;}
  .receipt-split{display:flex;gap:10px;border-top:1px dashed var(--line);padding-top:12px;}
  .receipt-split .who{flex:1;font-size:12.5px;}
  .receipt-split .who .name{color:var(--ink-soft);}
  .receipt-split .who .amt{font-weight:600;font-size:14.5px;display:block;margin-top:2px;}

  .stat-toggle{display:flex;gap:8px;margin:18px 20px 10px;}
  .stat-toggle button{padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:var(--paper);color:var(--ink-soft);font-size:12.5px;cursor:pointer;font-family:'Work Sans',sans-serif;}
  .stat-toggle button.active.exp{background:var(--rust);border-color:var(--rust);color:#fff;}
  .stat-toggle button.active.inc{background:var(--sage);border-color:var(--sage);color:#fff;}

  .cat-bars{margin:0 20px;display:flex;flex-direction:column;gap:8px;}
  .cat-bar-row{display:flex;align-items:center;gap:10px;font-size:12.5px;}
  .cat-bar-row .cname{width:58px;flex-shrink:0;color:var(--ink-soft);}
  .cat-bar-row .track{flex:1;height:7px;background:var(--sage-tint);border-radius:4px;overflow:hidden;}
  .cat-bar-row .fill{height:100%;border-radius:4px;}
  .cat-bar-row .fill.exp{background:var(--rust);}
  .cat-bar-row .fill.inc{background:var(--sage);}
  .cat-bar-row .camt{width:64px;text-align:right;flex-shrink:0;color:var(--ink);}
  .cat-empty{font-size:12.5px;color:var(--ink-soft);padding:6px 4px;}

  .year-month-list{margin:0 20px;display:flex;flex-direction:column;gap:8px;}
  .ym-row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .ym-row .ym-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .ym-row .ym-label{font-family:'Fraunces',serif;font-size:14.5px;font-weight:500;}
  .ym-row .ym-net{font-size:12.5px;color:var(--ink-soft);}
  .ym-bars{display:flex;flex-direction:column;gap:4px;}
  .ym-bar-row{display:flex;align-items:center;gap:8px;font-size:11px;}
  .ym-bar-row .t{width:26px;color:var(--ink-soft);}
  .ym-bar-row .track{flex:1;height:6px;background:var(--sage-tint);border-radius:3px;overflow:hidden;}
  .ym-bar-row .fill{height:100%;border-radius:3px;}
  .ym-bar-row .fill.exp{background:var(--rust);}
  .ym-bar-row .fill.inc{background:var(--sage);}
  .ym-bar-row .a{width:66px;text-align:right;flex-shrink:0;}

  .section-title{font-family:'Fraunces',serif;font-size:16px;font-weight:500;margin:26px 20px 10px;}
  .card{margin:0 20px 16px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;}

  .type-toggle{display:flex;gap:8px;margin-bottom:12px;}
  .type-toggle button{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--line);background:var(--cream);color:var(--ink-soft);font-size:14px;font-weight:500;font-family:'Work Sans',sans-serif;cursor:pointer;}
  .type-toggle button.active[data-type="expense"]{background:var(--rust);border-color:var(--rust);color:#fff;}
  .type-toggle button.active[data-type="income"]{background:var(--sage);border-color:var(--sage);color:#fff;}

  .who-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .who-toggle button{flex:1;padding:9px 0;border-radius:10px;border:1px solid var(--line);background:var(--cream);color:var(--ink-soft);font-size:13.5px;font-weight:500;font-family:'Work Sans',sans-serif;cursor:pointer;}
  .who-toggle button.active{background:var(--ink);border-color:var(--ink);color:#fff;}

  .amount-input{display:flex;align-items:baseline;gap:6px;border-bottom:1.5px solid var(--line);padding:6px 2px 10px;margin-bottom:16px;}
  .amount-input span{font-size:20px;color:var(--ink-soft);}
  .amount-input input{flex:1;border:none;outline:none;background:transparent;font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--ink);text-align:right;min-width:0;}
  .amount-input input::placeholder{color:#D8CBBA;}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .chip{padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:var(--cream);font-size:13px;color:var(--ink-soft);cursor:pointer;font-family:'Work Sans',sans-serif;}
  .chip.active.expense{background:var(--rust);border-color:var(--rust);color:#fff;}
  .chip.active.income{background:var(--sage);border-color:var(--sage);color:#fff;}
  .chip.add{border-style:dashed;color:var(--ink-soft);background:transparent;}
  .add-form{display:flex;gap:8px;margin:-4px 0 16px;}
  .add-form input{flex:1;min-width:0;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--cream);font-size:13px;font-family:'Work Sans',sans-serif;color:var(--ink);}
  .add-form button{padding:9px 13px;border-radius:9px;border:none;font-size:13px;cursor:pointer;font-family:'Work Sans',sans-serif;flex-shrink:0;}
  .add-form button.confirm{background:var(--ink);color:#fff;}
  .add-form button.cancel{background:var(--cream);color:var(--ink-soft);border:1px solid var(--line);}
  .edit-toggle{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;cursor:pointer;padding:0;font-family:'Work Sans',sans-serif;margin-bottom:6px;}
  .edit-toggle.on{color:var(--rust-dark);font-weight:600;}

  .budget-list{margin:0 20px 8px;display:flex;flex-direction:column;gap:8px;}
  .budget-row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .budget-row .b-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .budget-row .b-major{font-family:'Fraunces',serif;font-size:14px;font-weight:500;}
  .budget-row .b-set{font-size:11.5px;color:var(--ink-soft);text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:'Work Sans',sans-serif;}
  .budget-row .b-nums{font-size:11.5px;color:var(--ink-soft);margin-bottom:6px;}
  .budget-row .track{height:7px;background:var(--sage-tint);border-radius:4px;overflow:hidden;}
  .budget-row .fill{height:100%;border-radius:4px;}
  .budget-row .fill.ok{background:var(--sage);}
  .budget-row .fill.over{background:var(--rust);}
  .b-edit-form{display:flex;gap:8px;margin-top:10px;}
  .b-edit-form input{flex:1;min-width:0;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--cream);font-size:13px;font-family:'Work Sans',sans-serif;}
  .b-edit-form button{padding:8px 12px;border-radius:8px;border:none;font-size:12.5px;cursor:pointer;font-family:'Work Sans',sans-serif;flex-shrink:0;}
  .b-edit-form button.confirm{background:var(--ink);color:#fff;}
  .b-edit-form button.cancel{background:var(--rust-tint);color:var(--rust-dark);}

  .field-row{display:flex;gap:10px;margin-bottom:12px;}
  .field-row > div{flex:1;}
  label{display:block;font-size:11.5px;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.02em;}
  input[type=date], input[type=text]{width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--cream);font-size:14px;color:var(--ink);font-family:'Work Sans',sans-serif;}

  .save-btn{width:100%;padding:14px;border-radius:11px;border:none;color:#fff;font-size:15px;font-weight:600;font-family:'Work Sans',sans-serif;cursor:pointer;letter-spacing:.01em;}
  .save-btn[data-type="expense"]{background:var(--rust);}
  .save-btn[data-type="income"]{background:var(--sage-dark);}
  .save-btn:active{transform:scale(0.98);}

  .tx-list{margin:0 20px;display:flex;flex-direction:column;gap:2px;}
  .day-picker{display:flex;gap:8px;overflow-x:auto;padding:2px 20px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .day-picker::-webkit-scrollbar{display:none;}
  .day-chip{flex:0 0 auto;width:42px;height:54px;border-radius:12px;border:1px solid var(--line);background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:'Work Sans',sans-serif;padding:0;}
  .day-chip .wd{font-size:10px;color:var(--ink-soft);}
  .day-chip .dn{font-size:15px;font-weight:600;color:var(--ink);}
  .day-chip .dot{width:4px;height:4px;border-radius:50%;background:var(--rust);}
  .day-chip.today{border-color:var(--rust);border-width:1.5px;}
  .day-chip.active{background:var(--ink);border-color:var(--ink);}
  .day-chip.active .wd{color:#D8CBBA;}
  .day-chip.active .dn{color:#fff;}
  .day-chip.active .dot{background:#fff;}
  .day-summary{margin:0 20px 10px;font-size:12.5px;color:var(--ink-soft);}
  .day-summary b{color:var(--ink);}
  .tx-date-group{margin-bottom:14px;}
  .tx-date-label{font-size:11.5px;color:var(--ink-soft);margin:0 4px 6px;letter-spacing:.02em;display:flex;justify-content:space-between;align-items:baseline;}
  .tx-date-label .day-sum{font-size:11.5px;}
  .tx-date-label .day-sum b{font-weight:600;}
  .tx{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:6px;cursor:pointer;}
  .tx .tag{width:40px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;font-family:'Work Sans',sans-serif;letter-spacing:-0.02em;}
  .tx .tag.expense{background:var(--rust-tint);color:var(--rust-dark);}
  .tx .tag.income{background:var(--sage-tint);color:var(--sage-dark);}
  .tx .mid{flex:1;min-width:0;}
  .tx .mid .cat{font-size:13.5px;font-weight:500;}
  .tx .mid .memo{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx .right{text-align:right;flex-shrink:0;}
  .tx .right .amt{font-size:14.5px;font-weight:600;}
  .tx .right .amt.income{color:var(--sage-dark);}
  .tx .right .who{font-size:11px;color:var(--ink-soft);}
  .tx .del{width:22px;height:22px;border:none;background:none;color:#D8CBBA;font-size:16px;cursor:pointer;flex-shrink:0;padding:0;}

  .empty{text-align:center;padding:36px 20px;color:var(--ink-soft);font-size:13.5px;}
  .sync-note{margin:6px 20px 0;font-size:11.5px;color:var(--ink-soft);text-align:center;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>우리집 가계부</h1>
    <p>고운 &amp; 재원</p>
  </header>

  <div class="view-toggle" id="viewToggle">
    <button data-view="month" class="active">월별</button>
    <button data-view="year">연간</button>
  </div>

  <!-- MONTH VIEW -->
  <div id="monthView">
    <div class="month-nav">
      <button id="prevMonth" aria-label="이전 달">‹</button>
      <div class="label" id="monthLabel">-</div>
      <button id="nextMonth" aria-label="다음 달">›</button>
    </div>

    <div class="view-toggle" id="monthSubTabToggle">
      <button data-subtab="input" class="active">홈</button>
      <button data-subtab="summary">예산</button>
      <button data-subtab="installment">할부</button>
    </div>

    <!-- SUB TAB 1: 입력 → 이번 달 잔액 요약 → 상세 내역 -->
    <div id="monthInputTab">
      <div class="section-title" style="margin-top:18px;">추가하기</div>
      <div class="card">
        <div class="type-toggle" id="typeToggle">
          <button data-type="expense" class="active" data-type="expense">지출</button>
          <button data-type="income" data-type="income">수입</button>
        </div>

        <div class="who-toggle" id="whoToggle">
          <button data-who="공용" class="active">공용</button>
          <button data-who="고운">고운</button>
          <button data-who="재원">재원</button>
        </div>

        <div class="amount-input">
          <span>₩</span>
          <input type="text" inputmode="numeric" id="amountInput" placeholder="0">
        </div>

        <div id="paymentSection">
          <div class="who-toggle" id="paymentToggle">
            <button data-payment="card" class="active" type="button">카드</button>
            <button data-payment="cash" type="button">현금</button>
          </div>

          <div id="cardSection">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <label style="margin-bottom:6px;">카드</label>
              <button type="button" id="cardEditToggle" class="edit-toggle">편집</button>
            </div>
            <div class="chip-row" id="cardChips"></div>
            <div class="add-form" id="cardAddForm" style="display:none;"></div>

            <div class="who-toggle" id="installmentToggle" style="margin-top:2px;">
              <button data-installment="false" class="active" type="button">일시불</button>
              <button data-installment="true" type="button">할부</button>
            </div>
            <div id="installmentMonthsRow" style="display:none;margin-bottom:16px;">
              <label for="installmentMonthsInput">할부 개월 수</label>
              <input type="text" inputmode="numeric" id="installmentMonthsInput" placeholder="예: 3">
            </div>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label style="margin-bottom:6px;">대분류</label>
          <button type="button" id="majorEditToggle" class="edit-toggle">편집</button>
        </div>
        <div class="chip-row" id="majorChips"></div>
        <div class="add-form" id="majorAddForm" style="display:none;"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <label style="margin-bottom:6px;">소분류</label>
          <button type="button" id="subEditToggle" class="edit-toggle">편집</button>
        </div>
        <div class="chip-row" id="catChips"></div>
        <div class="add-form" id="subAddForm" style="display:none;"></div>

        <div class="field-row">
          <div>
            <label for="dateInput">날짜</label>
            <input type="date" id="dateInput">
          </div>
          <div>
            <label for="memoInput">메모</label>
            <input type="text" id="memoInput" placeholder="상세 내용">
          </div>
        </div>

        <div id="editBanner" style="display:none;margin-bottom:10px;justify-content:space-between;align-items:center;">
          <span style="font-size:12.5px;color:var(--ink-soft);">내역을 수정하는 중이에요</span>
          <button type="button" id="cancelEditBtn" class="edit-toggle">취소</button>
        </div>

        <button class="save-btn" id="saveBtn" data-type="expense">저장하기</button>
      </div>

      <div class="receipt" style="margin-top:26px;">
        <div class="receipt-total-label">이번 달 잔액</div>
        <div class="receipt-total" id="monthNet">0원</div>
        <div class="receipt-io">
          <div class="box exp"><span class="lbl"><span class="dot"></span>지출</span><span class="val" id="monthExpense">0원</span></div>
          <div class="box inc"><span class="lbl"><span class="dot"></span>수입</span><span class="val" id="monthIncome">0원</span></div>
        </div>
        <div class="receipt-split">
          <div class="who"><span class="name">공용</span><span class="amt" id="totalGongyong">0원</span></div>
          <div class="who"><span class="name">고운</span><span class="amt" id="totalGoeun">0원</span></div>
          <div class="who"><span class="name">재원</span><span class="amt" id="totalJaewon">0원</span></div>
        </div>
      </div>

      <div class="section-title">내역</div>
      <div class="day-picker" id="dayPicker"></div>
      <div id="txContainer"></div>
    </div>

    <!-- SUB TAB 2: 예산 -->
    <div id="monthSummaryTab" style="display:none;">
      <div class="section-title" style="margin-bottom:6px;margin-top:18px;">이번 달 예산</div>
      <div style="margin:0 20px 10px;display:flex;justify-content:flex-end;">
        <button type="button" id="copyLastMonthBudget" class="edit-toggle">지난달 예산 불러오기</button>
      </div>
      <div class="card" id="budgetSummary"></div>
      <div class="budget-list" id="budgetList"></div>

      <div class="section-title" style="margin-bottom:10px;">이번 달 카드별 지출</div>
      <div class="cat-bars" id="cardBars"></div>

      <div class="section-title" style="margin-bottom:10px;">이번 달 수입 카테고리</div>
      <div class="cat-bars" id="catBars"></div>
    </div>

    <!-- SUB TAB 3: 할부 현황 -->
    <div id="monthInstallmentTab" style="display:none;">
      <div class="section-title" style="margin-top:18px;">이번 달 할부</div>
      <div class="card" id="installmentSummary"></div>
      <div class="budget-list" id="installmentList"></div>
    </div>

  </div>

  <!-- YEAR VIEW -->
  <div id="yearView" style="display:none;">
    <div class="month-nav">
      <button id="prevYear" aria-label="이전 해">‹</button>
      <div class="label" id="yearLabel">-</div>
      <button id="nextYear" aria-label="다음 해">›</button>
    </div>

    <div class="receipt">
      <div class="receipt-total-label">올해 잔액</div>
      <div class="receipt-total" id="yearNet">0원</div>
      <div class="receipt-io">

  const idx = budgets.findIndex(b=>b.id===id);

  }catch(e){ toast('예산 저장에 실패했어요.'); }

async function loadCategories(){
  try{
    const { data, error } = await sb.from('categories').select('*').order('created_at', { ascending:true });
    if(error) throw error;
    const rows = data || [];
    if(rows.length === 0) return; // 아직 seed_categories.sql 안 돌리셨으면 기본값 그대로 사용
    const built = { expense: [], income: [] };
    rows.forEach(row=>{
      const list = built[row.type];
      if(!list) return;
      let m = list.find(x=>x.major===row.major);
      if(!m){ m = { major: row.major, subs: [] }; list.push(m); }
      if(!m.subs.includes(row.sub)) m.subs.push(row.sub);
    });
    if(built.expense.length) CATS.expense = built.expense;
    if(built.income.length) CATS.income = built.income;
    // 지금 선택된 대분류/소분류가 삭제/변경됐을 수 있으니 안전하게 보정
    if(!CATS[selectedType].some(m=>m.major===selectedMajor)){
      selectedMajor = CATS[selectedType][0].major;
      selectedCat = null;
    } else if(selectedCat){
      const m = CATS[selectedType].find(m=>m.major===selectedMajor);
      if(!m.subs.includes(selectedCat)) selectedCat = null;
    }
  }catch(e){ /* DB 연결 실패 시 기본 카테고리로 계속 사용 */ }
}

$('saveBtn').addEventListener('click', async ()=>{
  const raw = $('amountInput').value.replace(/[^0-9]/g,'');
  const amount = Number(raw);
  if(!amount){ toast('금액을 입력해 주세요'); return; }
  if(!selectedCat){ toast('소분류를 선택해 주세요'); return; }
  const date = $('dateInput').value || new Date().toISOString().slice(0,10);
  const memo = $('memoInput').value.trim();

  const isExpense = selectedType === 'expense';
  const paymentMethod = isExpense ? selectedPayment : null;
  const cardName = (isExpense && selectedPayment==='card') ? selectedCard : null;
  const installmentOn = isExpense && selectedPayment==='card' && isInstallment;
  let installmentMonthsVal = null;
  if(installmentOn){
    installmentMonthsVal = Number($('installmentMonthsInput').value);
    if(!installmentMonthsVal || installmentMonthsVal < 2){ toast('할부 개월 수를 입력해 주세요 (2개월 이상)'); return; }
  }
  if(isExpense && selectedPayment==='card' && !cardName){ toast('카드를 선택해 주세요'); return; }

  if(editingId){
    const idx = transactions.findIndex(t=>t.id===editingId);
    const entry = {
      id: editingId,
      type: selectedType, date, amount, category: selectedCat, who: selectedWho, memo,
      paymentMethod, cardName, installment: installmentOn, installmentMonths: installmentMonthsVal,
      createdAt: idx>-1 ? transactions[idx].createdAt : Date.now()
    };
    if(idx>-1) transactions[idx] = entry;
    await updateTx(entry);
    selectedDay = date;
    toast('수정했어요');
    cancelEdit();
    render();
    return;
  }

  const entry = {
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    type: selectedType, date, amount, category: selectedCat, who: selectedWho, memo,
    paymentMethod, cardName, installment: installmentOn, installmentMonths: installmentMonthsVal,
    createdAt: Date.now()
  };
  transactions.push(entry);
  await insertTx(entry);
  selectedDay = date;

  $('amountInput').value = '';
  $('memoInput').value = '';
  $('installmentMonthsInput').value = '';
  selectedPayment = 'card';
  selectedCard = null;
  isInstallment = false;
  selectedCat = null;
  buildSubChips();
  document.querySelectorAll('#paymentToggle button').forEach(b=>b.classList.toggle('active', b.dataset.payment==='card'));
  document.querySelectorAll('#installmentToggle button').forEach(b=>b.classList.toggle('active', b.dataset.installment==='false'));
  buildCardChips();
  $('cardSection').style.display = selectedType==='expense' ? '' : 'none';
  $('installmentMonthsRow').style.display = 'none';

  render();
});

function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function catBarsHTML(list, type){
  const byCat = {};
  list.forEach(t=>{ byCat[t.category] = (byCat[t.category]||0) + t.amount; });
  const entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,6);
  if(entries.length===0) return '<div class="cat-empty">아직 내역이 없어요.</div>';
  const max = entries[0][1];
  return entries.map(([name,amt])=>`
    <div class="cat-bar-row">
      <div class="cname">${name}</div>
      <div class="track"><div class="fill ${type}" style="width:${Math.max(6,(amt/max)*100)}%"></div></div>
      <div class="camt">${fmt(amt)}</div>
    </div>`).join('');
}

function cardBarsHTML(expenseTxList){
  const byCard = {};
  expenseTxList.forEach(t=>{
    const label = t.paymentMethod==='card' && t.cardName ? t.cardName : '현금';
    byCard[label] = (byCard[label]||0) + t.amount;
  });
  const entries = Object.entries(byCard).sort((a,b)=>b[1]-a[1]);
  if(entries.length===0) return '<div class="cat-empty">아직 내역이 없어요.</div>';
  const max = entries[0][1];
  return entries.map(([name,amt])=>`
    <div class="cat-bar-row">
      <div class="cname" style="width:96px;">${name}</div>
      <div class="track"><div class="fill exp" style="width:${Math.max(6,(amt/max)*100)}%"></div></div>
      <div class="camt">${fmt(amt)}</div>
    </div>`).join('');
}

function spentByMajor(expenseTxList){
  const map = {};
  expenseTxList.forEach(t=>{
    const major = findMajorOf('expense', t.category);
    map[major] = (map[major]||0) + t.amount;
  });
  return map;
}

function renderInstallments(mk){
  const summaryEl = $('installmentSummary');
  const listEl = $('installmentList');
  if(!summaryEl || !listEl) return;

  const curDate = new Date(mk+'-01');
  const active = transactions.filter(t=>{
    if(t.type!=='expense' || !t.installment || !t.installmentMonths || !t.date) return false;
    const startDate = new Date(t.date.slice(0,7)+'-01');
    const idx = (curDate.getFullYear()-startDate.getFullYear())*12 + (curDate.getMonth()-startDate.getMonth());
    return idx>=0 && idx < t.installmentMonths;
  }).sort((a,b)=> a.date.localeCompare(b.date));

  if(active.length===0){
    listEl.innerHTML = '<div class="empty">이 달에 진행 중인 할부가 없어요.</div>';
    summaryEl.innerHTML = `<div style="font-size:12.5px;color:var(--ink-soft);">할부로 결제하면 여기서 월별 납입액과 남은 금액을 볼 수 있어요.</div>`;
    return;
  }

  let totalMonthly = 0;
  const rows = active.map(t=>{
    const startDate = new Date(t.date.slice(0,7)+'-01');
    const idx = (curDate.getFullYear()-startDate.getFullYear())*12 + (curDate.getMonth()-startDate.getMonth());
    const months = t.installmentMonths;
    const base = Math.floor(t.amount/months);
    const remainder = t.amount - base*months;
    const isLast = idx === months-1;
    const monthlyAmt = isLast ? base+remainder : base;
    const paidSoFar = isLast ? t.amount : base*(idx+1);
    const remainAfter = Math.max(0, t.amount - paidSoFar);
    totalMonthly += monthlyAmt;
    const pct = ((idx+1)/months)*100;
    const cardLabel = t.cardName ? t.cardName+' · ' : '';

    return `
      <div class="budget-row">
        <div class="b-top">
          <div class="b-major">${cardLabel}${t.category}${t.memo ? ' · '+t.memo : ''}</div>
          <div style="font-size:11.5px;color:var(--ink-soft);flex-shrink:0;">${idx+1}/${months}개월</div>
        </div>
        <div class="b-nums">이번 달 납입 <b>${fmt(monthlyAmt)}</b> · 총액 ${fmt(t.amount)} · 남은 <b style="color:${remainAfter>0?'var(--rust-dark)':'var(--sage-dark)'}">${fmt(remainAfter)}</b></div>
        <div class="track"><div class="fill ok" style="width:${Math.min(100,pct)}%"></div></div>
      </div>`;
  }).join('');

  listEl.innerHTML = rows;
  summaryEl.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:13px;">
      <div><div style="color:var(--ink-soft);font-size:11px;">진행 중 할부</div><div style="font-weight:600;">${active.length}건</div></div>
      <div><div style="color:var(--ink-soft);font-size:11px;">이번 달 납입 총액</div><div style="font-weight:600;">${fmt(totalMonthly)}</div></div>
    </div>`;
}

function renderBudgetSection(mk, expenseTx){
  const spent = spentByMajor(expenseTx);
  const monthBudgets = budgets.filter(b=>b.month===mk);
  const budgetMap = {};
  monthBudgets.forEach(b=>{ budgetMap[b.major] = b.amount; });

  const totalBudget = monthBudgets.reduce((s,b)=>s+b.amount,0);
  const totalSpent = Object.values(spent).reduce((s,v)=>s+v,0);
  const totalRemain = totalBudget - totalSpent;

  $('budgetSummary').innerHTML = totalBudget>0
    ? `<div style="display:flex;justify-content:space-between;font-size:13px;">
        <div><div style="color:var(--ink-soft);font-size:11px;">총 예산</div><div style="font-weight:600;">${fmt(totalBudget)}</div></div>
        <div><div style="color:var(--ink-soft);font-size:11px;">지출</div><div style="font-weight:600;">${fmt(totalSpent)}</div></div>
        <div><div style="color:var(--ink-soft);font-size:11px;">남음</div><div style="font-weight:600;color:${totalRemain>=0?'var(--sage-dark)':'var(--rust-dark)'};">${(totalRemain>=0?'':'-')+fmt(Math.abs(totalRemain))}</div></div>
      </div>`
    : `<div style="font-size:12.5px;color:var(--ink-soft);">아직 예산을 설정하지 않았어요. 아래 카테고리별로 설정해보세요.</div>`;

  const list = $('budgetList');
  list.innerHTML = '';
  CATS.expense.forEach(m=>{
    const budgetAmt = budgetMap[m.major] || 0;
    const spentAmt = spent[m.major] || 0;
    const remain = budgetAmt - spentAmt;
    const pct = budgetAmt>0 ? Math.min(100,(spentAmt/budgetAmt)*100) : 0;
    const over = budgetAmt>0 && spentAmt>budgetAmt;

    const row = document.createElement('div');
    row.className = 'budget-row';
    row.innerHTML = `
      <div class="b-top">
        <div class="b-major">${m.major}</div>
        <button type="button" class="b-set">${budgetAmt>0 ? '수정' : '예산 설정'}</button>
      </div>
      ${budgetAmt>0
        ? `<div class="b-nums"><b>${fmt(spentAmt)}</b> / ${fmt(budgetAmt)} 사용 · 남음 <b style="color:${remain>=0?'var(--sage-dark)':'var(--rust-dark)'}">${(remain>=0?'':'-')+fmt(Math.abs(remain))}</b></div>
           <div class="track"><div class="fill ${over?'over':'ok'}" style="width:${Math.max(pct, spentAmt>0?4:0)}%"></div></div>`
        : (spentAmt>0 ? `<div class="b-nums">이번 달 지출 <b>${fmt(spentAmt)}</b></div>` : '')}
    `;
    row.querySelector('.b-set').onclick = ()=> openBudgetEdit(row, mk, m.major, budgetAmt);
    list.appendChild(row);
  });
}

function openBudgetEdit(row, mk, major, current){
  const existing = row.querySelector('.b-edit-form');
  if(existing){ existing.remove(); return; }
  document.querySelectorAll('.b-edit-form').forEach(f=>f.remove());

  const form = document.createElement('div');
  form.className = 'b-edit-form';
  form.innerHTML = `<input type="text" inputmode="numeric" placeholder="예산 금액" value="${current>0?current.toLocaleString('ko-KR'):''}">
    <button type="button" class="confirm">저장</button>
    ${current>0 ? '<button type="button" class="cancel del">삭제</button>' : ''}`;
  row.appendChild(form);

  const input = form.querySelector('input');
  input.focus();
  input.addEventListener('input', e=>{
    const digits = e.target.value.replace(/[^0-9]/g,'');
    e.target.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
  });

  const submit = async ()=>{
    const raw = input.value.replace(/[^0-9]/g,'');
    const amount = Number(raw);
    if(!amount){ toast('금액을 입력해 주세요'); return; }
    await saveBudget(mk, major, amount);
    toast('예산을 저장했어요');
  };
  form.querySelector('.confirm').onclick = submit;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); submit(); } });

  const delBtn = form.querySelector('.del');
  if(delBtn){
    delBtn.onclick = async ()=>{
      await deleteBudget(mk, major);
      toast('예산을 삭제했어요');
    };
  }
}

function renderMonth(){
  const mk = monthKey(currentMonth);
  $('monthLabel').textContent = currentMonth.getFullYear()+'년 '+(currentMonth.getMonth()+1)+'월';

  const monthTx = transactions.filter(t=>t.date && t.date.slice(0,7)===mk)
    .sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt);

  const expenseTx = monthTx.filter(t=>t.type==='expense');
  const incomeTx = monthTx.filter(t=>t.type==='income');
  const totalExpense = expenseTx.reduce((s,t)=>s+t.amount,0);
  const totalIncome = incomeTx.reduce((s,t)=>s+t.amount,0);
  const net = totalIncome - totalExpense;

  const netEl = $('monthNet');
  netEl.textContent = (net>=0?'+':'-') + fmt(Math.abs(net));
  netEl.className = 'receipt-total ' + (net>=0?'positive':'negative');
  $('monthExpense').textContent = fmt(totalExpense);
  $('monthIncome').textContent = fmt(totalIncome);

  const byWho = {'고운':0,'재원':0,'공용':0};
  expenseTx.forEach(t=>{ byWho[t.who] = (byWho[t.who]||0) + t.amount; });
  $('totalGoeun').textContent = fmt(byWho['고운']||0);
  $('totalJaewon').textContent = fmt(byWho['재원']||0);
  $('totalGongyong').textContent = fmt(byWho['공용']||0);

  renderBudgetSection(mk, expenseTx);
  renderInstallments(mk);

  $('cardBars').innerHTML = cardBarsHTML(expenseTx);
  $('catBars').innerHTML = catBarsHTML(incomeTx, 'income');

  ensureSelectedDay(mk, monthTx);
  buildDayPicker(mk, monthTx);
  renderDayTx(monthTx);
}

function daysInMonth(date){
  return new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
}

function ensureSelectedDay(mk, monthTx){
  if(selectedDay && selectedDay.slice(0,7)===mk) return;
  const todayStr = new Date().toISOString().slice(0,10);
  if(todayStr.slice(0,7)===mk){
    selectedDay = todayStr;
    return;
  }
  if(monthTx.length){
    selectedDay = monthTx.map(t=>t.date).sort().reverse()[0];
  } else {
    selectedDay = mk+'-01';
  }
}

function buildDayPicker(mk, monthTx){
  const wrap = $('dayPicker');
  const dim = daysInMonth(currentMonth);
  const todayStr = new Date().toISOString().slice(0,10);
  const datesWithTx = new Set(monthTx.map(t=>t.date));

  let html = '';
  for(let day=1; day<=dim; day++){
    const dateStr = mk+'-'+String(day).padStart(2,'0');
    const d = new Date(dateStr+'T00:00:00');
    const wd = ['일','월','화','수','목','금','토'][d.getDay()];
    const isActive = dateStr===selectedDay;
    const isToday = dateStr===todayStr;
    html += `<button type="button" class="day-chip${isActive?' active':''}${isToday?' today':''}" data-date="${dateStr}">
      <span class="wd">${wd}</span><span class="dn">${day}</span>${datesWithTx.has(dateStr)?'<span class="dot"></span>':''}
    </button>`;
  }
  wrap.innerHTML = html;
  wrap.querySelectorAll('.day-chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      selectedDay = chip.dataset.date;
      buildDayPicker(mk, monthTx);
      renderDayTx(transactions.filter(t=>t.date && t.date.slice(0,7)===mk));
    });
  });
  const activeChip = wrap.querySelector('.day-chip.active');
  if(activeChip) activeChip.scrollIntoView({ inline:'center', block:'nearest' });
}

function renderDayTx(monthTx){
  const container = $('txContainer');
  if(monthTx.length===0){
    container.innerHTML = '<div class="empty">이 달 내역이 아직 없어요.<br>위에서 첫 내역을 추가해 보세요.</div>';
    return;
  }
  const dayTx = monthTx.filter(t=>t.date===selectedDay)
    .sort((a,b)=> b.createdAt-a.createdAt);

  const d = new Date(selectedDay+'T00:00:00');
  const label = (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+['일','월','화','수','목','금','토'][d.getDay()]+')';
  const dayExpense = dayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const dayIncome = dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const daySumBits = [];
  if(dayExpense>0) daySumBits.push(`지출 <b style="color:var(--rust-dark);">${fmt(dayExpense)}</b>`);
  if(dayIncome>0) daySumBits.push(`수입 <b style="color:var(--sage-dark);">${fmt(dayIncome)}</b>`);
  const summaryHTML = `<div class="day-summary"><span>${label}</span>${daySumBits.length ? ' · '+daySumBits.join(' · ') : ''}</div>`;

  if(dayTx.length===0){
    container.innerHTML = summaryHTML + '<div class="empty">이 날에는 내역이 없어요.</div>';
    return;
  }

  const rows = dayTx.map(t=>{
    const typeLabel = t.type==='income' ? '수입' : '지출';
    const sign = t.type==='income' ? '+' : '-';
    const payBits = [];
    if(t.cardName) payBits.push(t.cardName);
    else if(t.paymentMethod==='cash') payBits.push('현금');
    if(t.installment && t.installmentMonths) payBits.push('할부 '+t.installmentMonths+'개월');
    const payLine = payBits.length ? `<div class="memo">${payBits.join(' · ')}</div>` : '';
    return `
    <div class="tx" data-edit-id="${t.id}">
      <div class="tag ${t.type}">${typeLabel}</div>
      <div class="mid">
        <div class="cat">${t.category}</div>
        <div class="memo">${t.memo ? t.memo : '&nbsp;'}</div>
        ${payLine}
      </div>
      <div class="right">
        <div class="amt ${t.type}">${sign}${fmt(t.amount)}</div>
        <div class="who">${t.who}</div>
      </div>
      <button class="del" data-id="${t.id}" aria-label="삭제">×</button>
    </div>`;
  }).join('');

  container.innerHTML = summaryHTML + '<div class="tx-list">' + rows + '</div>';

  container.querySelectorAll('.del').forEach(btn=>{
    btn.addEventListener('click', (e)=>{ e.stopPropagation(); deleteTx(btn.dataset.id); });
  });
  container.querySelectorAll('.tx').forEach(row=>{
    row.addEventListener('click', ()=>{
      const t = transactions.find(x=>x.id===row.dataset.editId);
      if(t) startEditTx(t);
    });
  });
}

function renderYear(){
  $('yearLabel').textContent = currentYear+'년';
  const yearTx = transactions.filter(t=>t.date && t.date.slice(0,4)===String(currentYear));
  const expenseTx = yearTx.filter(t=>t.type==='expense');
  const incomeTx = yearTx.filter(t=>t.type==='income');
  const totalExpense = expenseTx.reduce((s,t)=>s+t.amount,0);
  const totalIncome = incomeTx.reduce((s,t)=>s+t.amount,0);
  const net = totalIncome - totalExpense;

  const netEl = $('yearNet');
  netEl.textContent = (net>=0?'+':'-') + fmt(Math.abs(net));
  netEl.className = 'receipt-total ' + (net>=0?'positive':'negative');
  $('yearExpense').textContent = fmt(totalExpense);
  $('yearIncome').textContent = fmt(totalIncome);

  const months = Array.from({length:12},(_,i)=>i+1);
  const monthData = months.map(m=>{
    const mk = currentYear+'-'+String(m).padStart(2,'0');
    const mExp = expenseTx.filter(t=>t.date.slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);
    const mInc = incomeTx.filter(t=>t.date.slice(0,7)===mk).reduce((s,t)=>s+t.amount,0);
    return {m, mExp, mInc};
  });
  const maxVal = Math.max(1, ...monthData.map(d=>Math.max(d.mExp,d.mInc)));

  $('yearMonthList').innerHTML = monthData.map(d=>{
    const net = d.mInc - d.mExp;
    return `
    <div class="ym-row">
      <div class="ym-top">
        <div class="ym-label">${d.m}월</div>
        <div class="ym-net">${(net>=0?'+':'-')+fmt(Math.abs(net))}</div>
      </div>
      <div class="ym-bars">
        <div class="ym-bar-row"><div class="t">지출</div><div class="track"><div class="fill exp" style="width:${Math.max(d.mExp?4:0,(d.mExp/maxVal)*100)}%"></div></div><div class="a">${fmt(d.mExp)}</div></div>
        <div class="ym-bar-row"><div class="t">수입</div><div class="track"><div class="fill inc" style="width:${Math.max(d.mInc?4:0,(d.mInc/maxVal)*100)}%"></div></div><div class="a">${fmt(d.mInc)}</div></div>
      </div>
    </div>`;
  }).join('');

  $('yearCatBars').innerHTML = catBarsHTML(yearStatFilter==='expense'?expenseTx:incomeTx, yearStatFilter);
}

function render(){
  if(currentView==='month') renderMonth(); else renderYear();
}

buildChips();
loadCategories().then(buildChips);
loadData();
loadBudgets().then(render);
loadCards().then(buildCardChips);

$('copyLastMonthBudget').addEventListener('click', async ()=>{
  const mk = monthKey(currentMonth);
  const prevDate = new Date(currentMonth); prevDate.setMonth(prevDate.getMonth()-1);
  const prevMk = monthKey(prevDate);
  const prevBudgets = budgets.filter(b=>b.month===prevMk);
  if(prevBudgets.length===0){ toast('지난달 예산이 없어요'); return; }
  for(const b of prevBudgets){
    const exists = budgets.some(x=>x.month===mk && x.major===b.major);
    if(!exists) await saveBudget(mk, b.major, b.amount);
  }
  toast('지난달 예산을 불러왔어요');
});

sb
  .channel('transactions-changes')
  .on('postgres_changes', { event:'*', schema:'public', table:'transactions' }, loadData)
  .subscribe();

sb
  .channel('categories-changes')
  .on('postgres_changes', { event:'*', schema:'public', table:'categories' }, ()=>{ loadCategories().then(buildChips); })
  .subscribe();

sb
  .channel('budgets-changes')
  .on('postgres_changes', { event:'*', schema:'public', table:'budgets' }, ()=>{ loadBudgets().then(render); })
  .subscribe();

sb
  .channel('cards-changes')
  .on('postgres_changes', { event:'*', schema:'public', table:'cards' }, ()=>{ loadCards().then(buildCardChips); })
  .subscribe();

})();
</script>
